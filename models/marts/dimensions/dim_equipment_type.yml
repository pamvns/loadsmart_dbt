version: 2

models:
  - name: dim_equipment_type
    description: One row per load with equipment type attributes. Join to fct_loads on loadsmart_id.
    columns:
      - name: loadsmart_id
        description: Load identifier (FK to fct_loads).
        tests:
          - unique
          - not_null
      - name: equipment_type
        description: Equipment code (e.g. RFR, DRV).
